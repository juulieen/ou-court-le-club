name: Scrape race registrations

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6h UTC
  workflow_dispatch:        # Manual trigger
    inputs:
      skip_scrape:
        description: 'Skip scraping (deploy-only, uses cached data)'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: ${{ !inputs.skip_scrape }}
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        if: ${{ !inputs.skip_scrape }}
        run: pip install -r requirements.txt

      - name: Restore config
        if: ${{ !inputs.skip_scrape }}
        env:
          CONFIG_YML: ${{ secrets.CONFIG_YML }}
        run: echo "$CONFIG_YML" > config.yml

      - name: Restore data caches
        if: ${{ !inputs.skip_scrape }}
        uses: actions/cache@v4
        with:
          path: |
            data/geocache.json
            data/scrape_cache.json
            data/njuko_slugs.json
            data/races.json
          key: scraper-data-${{ github.run_id }}
          restore-keys: |
            scraper-data-

      - name: Run scrapers
        if: ${{ !inputs.skip_scrape }}
        run: python -m scrapers.main

      - name: Fetch races.json from live site (skip_scrape mode)
        if: ${{ inputs.skip_scrape }}
        run: |
          mkdir -p docs/data
          curl -fsSL https://juulieen.github.io/ou-court-le-club/data/races.json \
            -o docs/data/races.json

      - name: Save data caches
        if: ${{ !inputs.skip_scrape }}
        uses: actions/cache/save@v4
        with:
          path: |
            data/geocache.json
            data/scrape_cache.json
            data/njuko_slugs.json
            data/races.json
          key: scraper-data-${{ github.run_id }}

      # Note: save_data() in main.py generates two versions:
      # - data/races.json (full, with member names — cached, never published)
      # - docs/data/races.json (first names only — deployed via Pages artifact)
      # First names are never committed to Git history.

      - name: Upload cache as artifact (for local sync)
        if: ${{ !inputs.skip_scrape }}
        uses: actions/upload-artifact@v4
        with:
          name: scraper-data
          path: |
            data/geocache.json
            data/scrape_cache.json
            data/njuko_slugs.json
            data/races.json
          retention-days: 7

      # --- Astro frontend build ---
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Copy races.json for Astro build
        run: |
          mkdir -p frontend/public/data frontend/src/data
          cp docs/data/races.json frontend/public/data/races.json
          cp docs/data/races.json frontend/src/data/races.json

      - name: Build Astro site
        run: cd frontend && npm run build
        env:
          PUBLIC_MAPTILER_KEY: ${{ secrets.MAPTILER_KEY }}

      # --- Deploy to GitHub Pages ---
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
