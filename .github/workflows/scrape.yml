name: Scrape race registrations

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6h UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore config
        env:
          CONFIG_YML: ${{ secrets.CONFIG_YML }}
        run: echo "$CONFIG_YML" > config.yml

      - name: Restore data caches
        uses: actions/cache@v4
        with:
          path: |
            data/geocache.json
            data/scrape_cache.json
            data/njuko_slugs.json
            data/races.json
          key: scraper-data-${{ github.run_id }}
          restore-keys: |
            scraper-data-

      - name: Run scrapers
        run: python -m scrapers.main

      - name: Save data caches
        uses: actions/cache/save@v4
        with:
          path: |
            data/geocache.json
            data/scrape_cache.json
            data/njuko_slugs.json
            data/races.json
          key: scraper-data-${{ github.run_id }}

      # Note: save_data() in main.py generates two versions:
      # - data/races.json (full, with member names — gitignored)
      # - docs/data/races.json (anonymized, no names — public)
      # No manual copy needed.

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data/races.json
          git diff --staged --quiet || git commit -m "Update race data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git pull --rebase
          git push
