name: Scrape race registrations

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6h UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore config
        env:
          CONFIG_YML: ${{ secrets.CONFIG_YML }}
        run: echo "$CONFIG_YML" > config.yml

      - name: Restore data caches
        uses: actions/cache@v4
        with:
          path: |
            data/geocache.json
            data/scrape_cache.json
            data/njuko_slugs.json
            data/races.json
          key: scraper-data-${{ github.run_id }}
          restore-keys: |
            scraper-data-

      - name: Run scrapers
        run: python -m scrapers.main

      - name: Save data caches
        uses: actions/cache/save@v4
        with:
          path: |
            data/geocache.json
            data/scrape_cache.json
            data/njuko_slugs.json
            data/races.json
          key: scraper-data-${{ github.run_id }}

      # Note: save_data() in main.py generates two versions:
      # - data/races.json (full, with member names — cached, never published)
      # - docs/data/races.json (first names only — deployed via Pages artifact)
      # First names are never committed to Git history.

      - name: Upload cache as artifact (for local sync)
        uses: actions/upload-artifact@v4
        with:
          name: scraper-data
          path: |
            data/geocache.json
            data/scrape_cache.json
            data/njuko_slugs.json
            data/races.json
          retention-days: 7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
